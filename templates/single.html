<!-- wp:group {"tagName":"main","layout":{"type":"default"}} -->
<main class="wp-block-group">

	<!-- Article wrapper: a single CSS-Grid container drives both desktop and mobile order. -->
	<!-- wp:group {"tagName":"article","className":"ekwa-single","style":{"spacing":{"padding":{"top":"var:preset|spacing|lg","bottom":"var:preset|spacing|xl"}}},"layout":{"type":"default"}} -->
	<article class="wp-block-group ekwa-single" style="padding-top:var(--wp--preset--spacing--lg);padding-bottom:var(--wp--preset--spacing--xl)">

		<!-- 1. Title -->
		<!-- wp:group {"className":"ekwa-single__title-area","layout":{"type":"default"}} -->
		<div class="wp-block-group ekwa-single__title-area">
			<!-- wp:post-title {"level":1,"className":"ekwa-single__title"} /-->
		</div>
		<!-- /wp:group -->

		<!-- 2. Meta row: date, author, categories, read-time -->
		<!-- wp:group {"className":"ekwa-single__meta","layout":{"type":"flex","flexWrap":"wrap"}} -->
		<div class="wp-block-group ekwa-single__meta">
			<!-- wp:post-date {"format":"F j, Y","className":"ekwa-single__meta-date"} /-->
			<!-- wp:post-author-name {"isLink":true,"className":"ekwa-single__meta-author"} /-->
			<!-- wp:post-terms {"term":"category","className":"ekwa-single__meta-cats"} /-->
			<!-- wp:ekwa/read-time {"className":"ekwa-single__meta-readtime"} /-->
		</div>
		<!-- /wp:group -->

		<!-- 3. Content column: featured image, tools, post content, back-to-category -->
		<!-- wp:group {"className":"ekwa-single__content","layout":{"type":"default"}} -->
		<div class="wp-block-group ekwa-single__content">

			<!-- Featured image (lives inside the content column) -->
			<!-- wp:group {"className":"ekwa-single__featured","layout":{"type":"default"}} -->
			<div class="wp-block-group ekwa-single__featured">
				<!-- wp:post-featured-image {"className":"ekwa-single__featured-image","style":{"border":{"radius":"14px"}}} /-->
			</div>
			<!-- /wp:group -->

			<!-- Tools row: share -->
			<!-- wp:group {"className":"ekwa-single__tools","layout":{"type":"flex","justifyContent":"right","flexWrap":"wrap"}} -->
			<div class="wp-block-group ekwa-single__tools">
				<!-- wp:ekwa/share-button /-->
			</div>
			<!-- /wp:group -->

			<!-- wp:post-content {"layout":{"type":"constrained"}} /-->

			<!-- wp:ekwa/back-to-category /-->

		</div>
		<!-- /wp:group -->

		<!-- 4. Post navigation (below content) -->
		<!-- wp:group {"className":"ekwa-single__postnav","layout":{"type":"flex","justifyContent":"space-between","flexWrap":"wrap"},"style":{"spacing":{"blockGap":"var:preset|spacing|md"}}} -->
		<div class="wp-block-group ekwa-single__postnav">
			<!-- wp:post-navigation-link {"type":"previous","showTitle":true,"linkLabel":true,"label":"← Previous Post"} /-->
			<!-- wp:post-navigation-link {"showTitle":true,"linkLabel":true,"label":"Next Post →"} /-->
		</div>
		<!-- /wp:group -->

		<!-- 5+6. Sidebar widgets: recent posts and categories -->
		<!-- wp:group {"className":"ekwa-single__widgets","layout":{"type":"default"}} -->
		<div class="wp-block-group ekwa-single__widgets">
			<!-- wp:ekwa/recent-posts /-->
			<!-- wp:ekwa/categories /-->
		</div>
		<!-- /wp:group -->

	</article>
	<!-- /wp:group -->

</main>
